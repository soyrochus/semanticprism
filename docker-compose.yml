services:
  semantic-prism-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: semantic_prism
      POSTGRES_USER: semantic_prism
      POSTGRES_PASSWORD: semantic_prism
    ports:
      - "5432:5432"
    volumes:
      - semantic-prism-db:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
      - ./packages/core/migrations:/schema/migrations:ro
      - ./packages/core/seeds:/schema/seeds:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semantic_prism -d semantic_prism"]
      interval: 5s
      timeout: 3s
      retries: 10

  semantic-prism-core:
    build:
      context: .
      dockerfile: Dockerfile.core
    environment:
      CORE_PORT: "4000"
      DATABASE_URL: postgres://semantic_prism:semantic_prism@semantic-prism-db:5432/semantic_prism
      STRUTS_ADAPTER_URL: http://struts-adapter-service:4100
      SAMPLE_REPOSITORY_PATH: /sample-struts-repo
    depends_on:
      semantic-prism-db:
        condition: service_healthy
      struts-adapter-service:
        condition: service_started
    ports:
      - "4000:4000"
    volumes:
      - ./sample-struts-repo:/sample-struts-repo:ro

  struts-adapter-service:
    build:
      context: .
      dockerfile: Dockerfile.struts-adapter
    environment:
      STRUTS_ADAPTER_PORT: "4100"
      SAMPLE_REPOSITORY_PATH: /sample-struts-repo
    ports:
      - "4100:4100"
    volumes:
      - ./sample-struts-repo:/sample-struts-repo:ro

  semantic-prism-ui:
    image: docker.io/library/node:22-alpine
    working_dir: /app/semantic-prism-mock
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_CORE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - semantic-prism-core

volumes:
  semantic-prism-db:
